      - docs/figma/Applicant - Dashboard - Evalution Result.png
      - docs/figma/Applicant - Evaluation Result.png
    intended_use:
      - applicant shell and navigation
      - application list/dashboard read model
      - application progress/status/allowed actions
      - invoice/payment status shell after submission
    reopen_trigger: new_or_changed_applicant_dashboard_or_status_screen
    notes: Exact frame-to-PNG mapping is not one-to-one in the current manifest; node IDs are family-level metadata.

