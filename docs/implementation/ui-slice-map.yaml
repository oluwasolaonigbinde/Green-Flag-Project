# Maps local Figma/PNG evidence to Green Flag delivery slices.
# Business rules still come from PRD/requirements/architecture, not UI labels.

version: 1

sources:
  manifest_json: docs/figma-manifest.json
  manifest_md: docs/figma-manifest.md
  png_dir: docs/figma
  snapshot_lock: docs/implementation/figma-snapshot-lock.json

evidence_status_values:
  - available
  - partial
  - missing
  - uncertain

screen_groups:
  - group_id: applicant_dashboard_and_application_list
    portal: applicant
    evidence_status: available
    related_slices: [4, 6]
    primary_slice: 4
    figma_node_ids:
      - "3:2"
      - "332:1647"
      - "44:231"
      - "214:3442"
      - "215:3602"
