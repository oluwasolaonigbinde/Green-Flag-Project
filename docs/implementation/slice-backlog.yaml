# Green Flag Award executable slice backlog
# Only this file selects the next production slice. Keep detailed scope in slice contracts.
# Valid status values: TODO, CONTRACT_REVIEW, IN_PROGRESS, DONE_BACKEND, DONE_FULL, REOPENED_FOR_UI, BLOCKED

workflow:
  active_statuses:
    - CONTRACT_REVIEW
    - IN_PROGRESS
    - REOPENED_FOR_UI
  next_slice_policy: first_eligible_todo_in_order
  blocked_policy: stop_if_blocked_slice_precedes_next_todo
  completion_policy:
    backend_complete_with_frontend_gaps: DONE_BACKEND
    backend_and_frontend_complete_against_available_ui: DONE_FULL
  reopen_policy:
    allowed_statuses_to_reopen:
      - DONE_BACKEND
      - DONE_FULL
    reopen_status: REOPENED_FOR_UI
    allowed_reasons:
      - new_figma_screens
      - changed_figma_screens
      - previously_stubbed_frontend_now_has_design_evidence
      - replace_mocks_with_approved_dtos
    forbidden_without_contract_review:
      - backend_business_rules
      - rbac
      - mystery_redaction
      - audit
      - state_machines
      - schema
      - core_api_behavior
      - production_assumptions

