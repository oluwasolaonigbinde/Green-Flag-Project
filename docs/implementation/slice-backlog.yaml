# Optional demo accelerants are not selected by the normal next_slice_policy.
# Activate manually only if client/demo pressure requires it.
demo_slices:
  - id: D1
    slug: applicant-demo-path
    title: Applicant demo path
    status: OPTIONAL
    depends_on: [0, 1, 2]
    purpose: Create a client-demoable applicant journey using real episode/cycle/application contracts where possible and explicit mocks/stubs where later slices are not ready.
    allowed_shortcuts:
      - mock_auth_session_if_real_cognito_not_ready
      - mock_w3w_os_ons_responses
      - mock_invoice_payment_status
    forbidden:
      - bypass_episode_first_architecture
      - hardcode_production_fees
      - implement_allocation_scoring_or_results
      - treat_demo_mocks_as_production_complete
